<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>MUSINSA</h1>
                <p>당신의 스타일링을 책임져 드립니다.</p>
            </div>
            
            <form action="#" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn">로그인</button>
            </form>
            
            <div class="footer">
                계정이 없으신가요? <a href="signup.html">회원가입 하기</a>
            </div>
            <div class="footer" style="margin-top: 1rem;">
                <a href="index.html" style="color: var(--text-muted); text-decoration: underline;">처음 화면으로 돌아가기</a>
            </div>
        </div>
    </div>
    <!-- 외부 JS 연결 -->
    <script src="script.js"></script>
</body>
</html>
