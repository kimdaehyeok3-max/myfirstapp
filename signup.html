<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Create Account</h1>
                <p>앱을 시작하기 위해 가입을 진행해주세요</p>
            </div>
            
            <form action="#" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" placeholder="홍길동" required>
                </div>

                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="8자 이상 입력" required>
                </div>
                
                <div class="form-group">
                    <label for="password-confirm">비밀번호 확인</label>
                    <input type="password" id="password-confirm" name="password-confirm" placeholder="동일하게 입력해주세요" required>
                </div>
                
                <button type="submit" class="btn">가입하기</button>
            </form>
            
            <div class="footer">
                이미 계정이 있으신가요? <a href="login.html">로그인 하러 가기</a>
            </div>
            <div class="footer" style="margin-top: 1rem;">
                <a href="index.html" style="color: var(--text-muted); text-decoration: underline;">처음 화면으로 돌아가기</a>
            </div>
        </div>
    </div>
    <!-- 외부 JS 연결 -->
    <script src="script.js"></script>
</body>
</html>
